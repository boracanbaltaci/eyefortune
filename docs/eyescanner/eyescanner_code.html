<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&amp;family=Noto+Sans:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f4c025",
                        "background-light": "#f8f8f5",
                        "background-dark": "#221e10",
                    },
                    fontFamily: {
                        "display": ["Noto Serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: "Noto Serif", serif;
        }
        .nebula-bg {
            background: radial-gradient(circle at 50% 50%, #3a3218 0%, #221e10 100%);
        }
        .scanner-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, #f4c025, transparent);
            box-shadow: 0 0 15px #f4c025;
            position: absolute;
            width: 100%;
            top: 50%;
        }
        .iris-glow {
            box-shadow: 0 0 40px rgba(244, 192, 37, 0.3);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Header -->
<header class="flex items-center bg-background-light dark:bg-background-dark p-4 justify-between border-b border-primary/10">
<div class="text-primary flex size-12 shrink-0 items-center justify-center cursor-pointer">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-12 font-display">Eye Scanner</h2>
</header>
<!-- Main Content -->
<main class="flex-1 flex flex-col items-center justify-center px-6 nebula-bg relative overflow-hidden">
<!-- Decorative Stars/Nebula Pattern -->
<div class="absolute inset-0 opacity-20 pointer-events-none bg-[url('https://www.transparenttextures.com/patterns/stardust.png')]"></div>
<h1 class="text-primary tracking-tight text-3xl font-bold leading-tight text-center mb-2 font-display">Your Soul's Mirror</h1>
<p class="text-slate-400 text-sm font-normal leading-normal text-center mb-8 max-w-xs">Align your eye with the central iris to reveal your hidden destiny.</p>
<!-- Eye Scanner Frame -->
<div class="relative w-72 h-72 @container">
<div class="absolute inset-0 rounded-full border-4 border-primary/20 iris-glow"></div>
<div class="absolute inset-4 rounded-full border-2 border-primary/40 border-dashed"></div>
<!-- Central Iris Area -->
<div class="absolute inset-8 rounded-full overflow-hidden bg-slate-900 flex items-center justify-center border border-primary/50">
<div class="w-full h-full bg-center bg-no-repeat bg-cover opacity-60" data-alt="Mystical deep space nebula with golden dust particles" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuAHB20FJxQNyx5dAKSAeQEOyiaolmfVm_GcvqYTd3Nf-NjFc2362oNV_IYfPKrIj23Qk6Gwscvz5TGJG7N7XmO7mhn6uE1xFLEklr3Bo7UpPUeXQvjTLZYltF4iLer8CcMi0MY_F7KWDxB9tDA4qbqhNwrpykGxQ59YbjDCuifoxzs-uUvz5t50mDtLp6_ZGCWwpLIjU4uq9KmBgWU0XBp1Px_ubjOGAHDJ1csmCKQ0Snzayt0xTDe_V23fsFDndMKDzBSBRMm44rU2");'>
</div>
<!-- Scanner Line -->
<div class="scanner-line"></div>
<!-- Placeholder Eye Icon -->
<div class="absolute text-primary/30">
<span class="material-symbols-outlined !text-8xl">visibility</span>
</div>
</div>
<!-- Corner Accents -->
<div class="absolute -top-2 -left-2 w-8 h-8 border-t-4 border-l-4 border-primary rounded-tl-lg"></div>
<div class="absolute -top-2 -right-2 w-8 h-8 border-t-4 border-r-4 border-primary rounded-tr-lg"></div>
<div class="absolute -bottom-2 -left-2 w-8 h-8 border-b-4 border-l-4 border-primary rounded-bl-lg"></div>
<div class="absolute -bottom-2 -right-2 w-8 h-8 border-b-4 border-r-4 border-primary rounded-br-lg"></div>
</div>
<!-- Progress/Status -->
<div class="mt-12 flex flex-col items-center gap-4 w-full max-w-xs">
<div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden">
<div class="bg-primary h-full w-1/3 shadow-[0_0_10px_#f4c025]"></div>
</div>
</div>
<!-- Action Button -->
<button class="mt-10 w-full max-w-xs py-4 px-8 bg-primary text-background-dark font-bold rounded-xl shadow-lg shadow-primary/20 active:scale-95 transition-transform flex items-center justify-center gap-2">
<span class="material-symbols-outlined">center_focus_strong</span>
            SCAN YOUR EYE
        </button>
</main>
<!-- Bottom Navigation Bar -->
<nav class="flex gap-2 border-t border-primary/10 bg-background-light dark:bg-background-dark px-4 pb-6 pt-3">
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-primary" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined text-[28px] fill-1">diamond</span>
</div>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-500 dark:text-slate-400" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined text-[28px]">auto_awesome</span>
</div>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-500 dark:text-slate-400" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined text-[28px]">dark_mode</span>
</div>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-500 dark:text-slate-400" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined text-[28px]">person</span>
</div>
</a>
</nav>
</body></html>
